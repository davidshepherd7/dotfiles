# ------------------------------------------------------------------------------
# What kitty does when you open a file:// URL (click, or via the hints kitten).
# Rules are first-match top-to-bottom, so the directory rule (more specific)
# comes before the generic file rule. Non-file URLs (http/ssh/...) don't match
# here and fall back to open_url_with in kitty.conf.
# ------------------------------------------------------------------------------

# A file:// URL that points at a directory -> open a NEW terminal window rooted
# in that directory. ($FILE_PATH is substituted by kitty with the decoded path.)
protocol file
mime inode/directory
action launch --type=os-window --cwd $FILE_PATH

# A file:// URL that points at a regular file -> open a NEW terminal window in
# the file's containing directory. kitty has no "parent dir" placeholder, so a
# tiny shell wrapper computes dirname at launch time. kitty expands $SHELL when
# it parses this line; $1 / $(dirname ...) are left untouched for the shell.
protocol file
action launch --type=os-window sh -c 'cd "$(dirname "$1")" && exec "$SHELL"' sh $FILE_PATH
