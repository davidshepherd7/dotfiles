# ------------------------------------------------------------------------------
# kitty  (translated from an urxvt config)
# ------------------------------------------------------------------------------

# ------------------------------------------------------------------------------
# Colors
# ------------------------------------------------------------------------------
background              #262626
foreground              #c2c2b0

# Black + DarkGrey
color0                  #262626
color8                  #73675b
# DarkRed + Red
color1                  #a64211
color9                  #cc5214
# DarkGreen + Green
color2                  #638046
color10                 #80a65b
# DarkYellow + Yellow
color3                  #bf8c25
color11                 #e6a82d
# DarkBlue + Blue
color4                  #4d6d99
color12                 #6088bf
# DarkMagenta + Magenta
color5                  #996b89
color13                 #bf86ac
# DarkCyan + Cyan
color6                  #6b8e99
color14                 #86b1bf
# LightGrey + White
color7                  #998a7a
color15                 #c2c2b0

# font_family postscript_name="DejaVu Sans Mono"
font_size               9.8

confirm_os_window_close 0
scrollback_lines        32767

# Cursor
enable_audio_bell       no
cursor_shape            block
cursor_blink_interval 0
shell_integration       no-cursor

# searchable-scrollback: built in. Opens the scrollback in your pager (less),
# which is searchable. Default key:
map alt+s        show_scrollback

map ctrl+v paste_from_clipboard

map shift+page_up scroll_page_up
map shift+page_down scroll_page_down

# ------------------------------------------------------------------------------
# Transparency
# ------------------------------------------------------------------------------
background_opacity      1.0
# dynamic_background_opacity lets you adjust it live with ctrl+shift+a then >/<
dynamic_background_opacity yes

##  Keep TEXT looking solid over the transparent background.
# # kitty only makes the background transparent; glyph *centers* stay opaque, but
# # the antialiased glyph *edges* blend into the transparent bg, so thin fonts read
# # as see-through. For light-text-on-dark, kitty's docs say to leave gamma at 1.0
# # and raise the 2nd number (contrast, 0-100) until text looks solid. Bump it
# # toward 40-60 if it still looks faded.
# text_composition_strategy 1.0 10

# selection-to-clipboard: copy whatever is selected straight to the clipboard.
copy_on_select          clipboard
# -confirm-paste: don't nag when pasting control characters (zsh handles it).
# Keep url-quoting, drop the confirmation prompt.
paste_actions           quote-urls-at-prompt

url_style               curly
open_url_with           default
# Detect these schemes as clickable links.
url_prefixes            http https file ftp git ssh mailto
